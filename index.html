<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovAI Chatbot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #7c6cfc;
      --accent2: #a78bfa;
      --accent-glow: rgba(124, 108, 252, 0.15);
      --text: #e8e8f0;
      --text-muted: #888898;
      --user-bubble: #7c6cfc;
      --bot-bubble: #1e1e24;
      --success: #34d399;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bot-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .bot-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .bot-name span { color: var(--accent2); }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--success);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px var(--accent-glow);
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 14px;
      max-width: 320px;
      line-height: 1.6;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: var(--accent-glow);
    }

    /* Message bubbles */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .msg-avatar.bot {
      background: linear-gradient(135deg, var(--accent), #c084fc);
    }

    .msg-avatar.user {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 70%;
    }

    .message-row.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .timestamp {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* Intent tag */
    .intent-tag {
      font-size: 10px;
      color: var(--accent2);
      opacity: 0.6;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 8px 0;
    }

    .input-wrap input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { fill: white; }

    .footer-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* Bold in bot messages */
    .bubble.bot strong {
      color: var(--accent2);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-name">Nov<span>AI</span></div>
        <div class="status-dot"><span class="dot"></span> Online</div>
      </div>
    </div>
    <button class="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hey, I'm NovAI!</h2>
      <p>I can tell jokes, motivate you, answer questions, do math, and much more. Try asking me something!</p>
      <div class="chips">
        <span class="chip" onclick="quickSend('Tell me a joke')">😄 Tell me a joke</span>
        <span class="chip" onclick="quickSend('Motivate me')">🔥 Motivate me</span>
        <span class="chip" onclick="quickSend('What time is it?')">⏰ Current time</span>
        <span class="chip" onclick="quickSend('Fun fact')">🧠 Fun fact</span>
        <span class="chip" onclick="quickSend('What can you do?')">❓ What can you do?</span>
        <span class="chip" onclick="quickSend('5 * 12')">🧮 5 * 12</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input
        type="text"
        id="userInput"
        placeholder="Type a message..."
        onkeydown="if(event.key==='Enter') sendMessage()"
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="footer-hint">NovAI · AI Chatbot · Built with Flask + Vanilla JS</div>
  </div>

  <script>
    const BACKEND = "http://localhost:5000";
    let messageCount = 0;

    function formatBold(text) {
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function addMessage(text, sender, meta = {}) {
      const welcome = document.getElementById("welcome");
      if (welcome) welcome.remove();

      const messages = document.getElementById("messages");
      messageCount++;

      const row = document.createElement("div");
      row.className = `message-row ${sender}`;

      const avatar = document.createElement("div");
      avatar.className = `msg-avatar ${sender}`;
      avatar.textContent = sender === "bot" ? "🤖" : "👤";

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = `bubble ${sender}`;
      bubble.innerHTML = formatBold(text);

      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = meta.time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      wrap.appendChild(bubble);

      if (sender === "bot" && meta.intent && meta.intent !== "fallback") {
        const tag = document.createElement("div");
        tag.className = "intent-tag";
        tag.textContent = `#${meta.intent}`;
        wrap.appendChild(tag);
      }

      wrap.appendChild(ts);
      row.appendChild(avatar);
      row.appendChild(wrap);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const messages = document.getElementById("messages");
      const row = document.createElement("div");
      row.className = "message-row bot";
      row.id = "typing-row";

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar bot";
      avatar.textContent = "🤖";

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot typing-bubble";
      bubble.innerHTML = "<span></span><span></span><span></span>";

      wrap.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(wrap);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing-row");
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(`${BACKEND}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        removeTyping();
        setTimeout(() => {
          addMessage(data.response, "bot", { intent: data.intent, time: data.timestamp });
        }, 200);
      } catch (err) {
        removeTyping();
        addMessage("⚠️ Could not connect to the backend. Make sure the Flask server is running on port 5000!", "bot");
      }

      sendBtn.disabled = false;
      input.focus();
    }

    function quickSend(text) {
      document.getElementById("userInput").value = text;
      sendMessage();
    }

    async function clearChat() {
      try {
        await fetch(`${BACKEND}/clear`, { method: "POST" });
      } catch (e) {}

      const messages = document.getElementById("messages");
      messages.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🤖</div>
          <h2>Hey, I'm NovAI!</h2>
          <p>I can tell jokes, motivate you, answer questions, do math, and much more. Try asking me something!</p>
          <div class="chips">
            <span class="chip" onclick="quickSend('Tell me a joke')">😄 Tell me a joke</span>
            <span class="chip" onclick="quickSend('Motivate me')">🔥 Motivate me</span>
            <span class="chip" onclick="quickSend('What time is it?')">⏰ Current time</span>
            <span class="chip" onclick="quickSend('Fun fact')">🧠 Fun fact</span>
            <span class="chip" onclick="quickSend('What can you do?')">❓ What can you do?</span>
            <span class="chip" onclick="quickSend('5 * 12')">🧮 5 * 12</span>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
