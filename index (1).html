<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RecruitAI — Resume Screening</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0c;
      --surface:   #111115;
      --surface2:  #18181e;
      --border:    #252530;
      --accent:    #00e5a0;
      --accent-dim: rgba(0,229,160,0.1);
      --accent2:   #00b87a;
      --warn:      #fbbf24;
      --danger:    #f87171;
      --text:      #e4e4f0;
      --muted:     #666680;
      --rank1:     #ffd700;
      --rank2:     #c0c0c0;
      --rank3:     #cd7f32;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent); }

    .header-badge {
      margin-left: auto;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      opacity: 0.8;
    }

    /* ── MAIN LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .page-title span { color: var(--accent); }

    .page-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 16px 20px; }
      .container { padding: 24px 16px 60px; }
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 13px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── TEXTAREA ── */
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── RESUME TABS ── */
    .resume-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab-btn.add-btn {
      border-style: dashed;
    }

    .tab-btn.add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── RESUME NAME INPUT ── */
    .name-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .name-input:focus { border-color: var(--accent); }
    .name-input::placeholder { color: var(--muted); }

    /* ── SAMPLE BUTTON ── */
    .sample-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .sample-btn {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .sample-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── ANALYZE BUTTON ── */
    .analyze-btn {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .analyze-btn:hover { background: #00ffb3; transform: translateY(-1px); }
    .analyze-btn:active { transform: translateY(0); }
    .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── LOADING ── */
    .loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--muted); font-size: 14px; }

    /* ── RESULTS ── */
    #results { display: none; margin-top: 40px; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: gap;
      gap: 12px;
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
    }

    .results-meta {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── CANDIDATE CARD ── */
    .candidate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .candidate-card:hover { border-color: var(--accent); }

    .candidate-card.rank-1 { border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.03); }
    .candidate-card.rank-2 { border-color: rgba(192,192,192,0.25); }
    .candidate-card.rank-3 { border-color: rgba(205,127,50,0.25); }

    .cand-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .cand-left { display: flex; align-items: center; gap: 14px; }

    .rank-badge {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .rank-1 .rank-badge { background: rgba(255,215,0,0.15); color: var(--rank1); }
    .rank-2 .rank-badge { background: rgba(192,192,192,0.1); color: var(--rank2); }
    .rank-3 .rank-badge { background: rgba(205,127,50,0.12); color: var(--rank3); }
    .rank-other .rank-badge { background: var(--surface2); color: var(--muted); }

    .cand-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .cand-email {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* SCORE CIRCLE */
    .score-circle {
      text-align: center;
      flex-shrink: 0;
    }

    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .score-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-high { color: var(--accent); }
    .score-mid  { color: var(--warn); }
    .score-low  { color: var(--danger); }

    /* SCORE BARS */
    .score-bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 500px) {
      .score-bars { grid-template-columns: 1fr; }
    }

    .bar-item { }

    .bar-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .bar-label span { color: var(--text); font-weight: 500; }

    .bar-track {
      height: 5px;
      background: var(--surface2);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.8s ease;
    }

    .bar-fill.tfidf { background: var(--accent); }
    .bar-fill.skill { background: var(--warn); }

    /* SKILLS */
    .skill-section { margin-top: 12px; }

    .skill-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .skill-row-label {
      color: var(--muted);
      min-width: 60px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .skill-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }

    .chip.match {
      background: rgba(0,229,160,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.2);
    }

    .chip.miss {
      background: rgba(248,113,113,0.08);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.15);
    }

    .chip.neutral {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* EXP BADGE */
    .exp-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 5px;
      margin-top: 10px;
    }

    /* SUMMARY STATS */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* JD SKILLS REQUIRED */
    .jd-skills-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .jd-skills-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* EXPORT BTN */
    .export-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .export-btn:hover {
      background: var(--accent-dim);
    }

    /* ERROR */
    .error-box {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* SECTIONS FOUND */
    .sections-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .section-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">🎯</div>
  <div class="logo-text">Recruit<span>AI</span></div>
  <div class="header-badge">TF-IDF + Skill Match</div>
</header>

<div class="container">
  <div class="page-title">Resume <span>Screening</span> AI</div>
  <div class="page-sub">Paste a job description and up to 5 resumes. We rank candidates by TF-IDF similarity + skill match score.</div>

  <!-- INPUT SECTION -->
  <div class="grid">
    <!-- JD -->
    <div class="card">
      <div class="card-title">Job Description</div>
      <textarea id="jdText" rows="14" placeholder="Paste the job description here...

Example:
We are looking for a Python Developer with experience in Flask, REST APIs, SQL databases, and basic ML knowledge. Strong problem-solving skills required."></textarea>
      <div class="sample-row">
        <button class="sample-btn" onclick="loadSampleJD('backend')">Sample: Backend Dev</button>
        <button class="sample-btn" onclick="loadSampleJD('data')">Sample: Data Scientist</button>
        <button class="sample-btn" onclick="loadSampleJD('fullstack')">Sample: Full Stack</button>
      </div>
    </div>

    <!-- RESUMES -->
    <div class="card">
      <div class="card-title">Candidate Resumes</div>
      <div class="resume-tabs" id="resumeTabs"></div>
      <input class="name-input" id="resumeName" placeholder="Candidate name (e.g. Rahul Sharma)" />
      <textarea id="resumeText" rows="10" placeholder="Paste resume text here...

Include sections like Skills, Experience, Education, and Projects for best results."></textarea>
      <div class="sample-row">
        <button class="sample-btn" onclick="loadSampleResume('strong')">Sample: Strong Match</button>
        <button class="sample-btn" onclick="loadSampleResume('medium')">Sample: Medium Match</button>
        <button class="sample-btn" onclick="loadSampleResume('weak')">Sample: Weak Match</button>
      </div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">⚡ Screen & Rank Candidates</button>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Analyzing resumes with TF-IDF...</p>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="results-header">
      <div class="results-title">Ranking Results</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div class="results-meta" id="resultsMeta"></div>
        <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div class="jd-skills-box" id="jdSkillsBox"></div>
    <div id="candidateList"></div>
  </div>
</div>

<script>
  const BACKEND = "http://localhost:5001";

  // ── RESUME STATE ──
  let resumes = [{ name: "", text: "" }];
  let activeResume = 0;

  function renderTabs() {
    const container = document.getElementById("resumeTabs");
    container.innerHTML = "";
    resumes.forEach((r, i) => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (i === activeResume ? " active" : "");
      btn.textContent = r.name || `Candidate ${i+1}`;
      btn.onclick = () => switchTab(i);
      container.appendChild(btn);
    });
    if (resumes.length < 5) {
      const add = document.createElement("button");
      add.className = "tab-btn add-btn";
      add.textContent = "+ Add";
      add.onclick = addResume;
      container.appendChild(add);
    }
  }

  function switchTab(i) {
    saveCurrentTab();
    activeResume = i;
    document.getElementById("resumeName").value = resumes[i].name;
    document.getElementById("resumeText").value = resumes[i].text;
    renderTabs();
  }

  function saveCurrentTab() {
    resumes[activeResume].name = document.getElementById("resumeName").value;
    resumes[activeResume].text = document.getElementById("resumeText").value;
  }

  function addResume() {
    saveCurrentTab();
    resumes.push({ name: "", text: "" });
    activeResume = resumes.length - 1;
    document.getElementById("resumeName").value = "";
    document.getElementById("resumeText").value = "";
    renderTabs();
  }

  document.getElementById("resumeName").addEventListener("input", () => {
    resumes[activeResume].name = document.getElementById("resumeName").value;
    renderTabs();
  });

  renderTabs();

  // ── SAMPLE DATA ──
  const sampleJDs = {
    backend: `We are looking for a skilled Python Backend Developer to join our team.

Requirements:
- 2+ years of experience with Python and Flask or Django
- Strong knowledge of REST API design and development
- Experience with SQL databases (PostgreSQL or MySQL)
- Familiarity with Docker and CI/CD pipelines
- Understanding of machine learning concepts is a plus
- Experience with Redis caching
- Git version control
- Strong problem-solving and communication skills`,

    data: `Data Scientist — AI Research Team

We need a talented Data Scientist with:
- 3+ years of experience in machine learning and deep learning
- Proficiency in Python, pandas, numpy, scikit-learn
- Experience with TensorFlow or PyTorch
- Knowledge of NLP techniques and HuggingFace Transformers
- Familiarity with SQL and big data tools (Spark, Hadoop)
- Data visualization skills (Tableau, Power BI, matplotlib)
- Strong statistical analysis background
- Communication and teamwork skills`,

    fullstack: `Full Stack Web Developer

We are hiring a Full Stack Developer skilled in:
- React.js or Vue.js for frontend development
- Node.js with Express or Python with Flask for backend
- HTML, CSS, JavaScript, TypeScript
- MySQL or MongoDB database management
- REST API integration
- Docker and AWS deployment
- Git and GitHub workflow
- Agile/Scrum methodology
- 2+ years of relevant experience`
  };

  const sampleResumes = {
    strong: `Rahul Sharma
rahul.sharma@email.com | +91 9876543210

EDUCATION
B.Tech Computer Science Engineering — NIT Raipur (2020–2024) | CGPA: 8.7

SKILLS
Programming: Python, JavaScript, TypeScript
Frameworks: Flask, Django, React, Node.js, Express
Databases: PostgreSQL, MySQL, MongoDB, Redis
DevOps: Docker, AWS, Git, GitHub, CI/CD
ML: scikit-learn, pandas, numpy, machine learning

EXPERIENCE
Backend Developer Intern — TechCorp (6 months)
- Built REST APIs using Flask and PostgreSQL
- Implemented Redis caching reducing load time by 40%
- Deployed services using Docker on AWS

PROJECTS
AI Resume Screener — Python, Flask, scikit-learn, TF-IDF
- Built end-to-end resume screening tool

ACHIEVEMENTS
- 3+ years of Python experience
- Problem solving, communication, teamwork`,

    medium: `Priya Verma
priya.verma@gmail.com

EDUCATION
B.Tech IT — VIT Vellore (2019–2023)

SKILLS
Languages: Python, Java, HTML, CSS
Frameworks: Django, Bootstrap
Database: MySQL, SQLite
Tools: Git, Linux

EXPERIENCE
Web Developer — Startup (3 months)
- Created web pages using HTML and CSS
- Worked with MySQL for data storage

PROJECTS
Portfolio Website — HTML, CSS, JavaScript
Blog App — Python, Django, SQLite

SOFT SKILLS
Communication, Teamwork, Leadership, Time Management`,

    weak: `Amit Kumar
amit123@yahoo.com

EDUCATION
BCA — Local College, Raipur (2020–2023)

SKILLS
MS Office, Photoshop, Basic HTML, Tally

EXPERIENCE
Data Entry Operator — 1 year
- Entered data in spreadsheets

HOBBIES
Cricket, Music, Travelling`
  };

  function loadSampleJD(type) {
    document.getElementById("jdText").value = sampleJDs[type];
  }

  function loadSampleResume(type) {
    saveCurrentTab();
    resumes[activeResume].text = sampleResumes[type];
    if (!resumes[activeResume].name) {
      const names = { strong: "Rahul Sharma", medium: "Priya Verma", weak: "Amit Kumar" };
      resumes[activeResume].name = names[type];
      document.getElementById("resumeName").value = names[type];
    }
    document.getElementById("resumeText").value = sampleResumes[type];
    renderTabs();
  }

  // ── ANALYZE ──
  async function analyze() {
    saveCurrentTab();
    hideError();

    const jd = document.getElementById("jdText").value.trim();
    if (!jd) { showError("Please enter a job description."); return; }

    const validResumes = resumes.filter(r => r.text.trim());
    if (validResumes.length === 0) { showError("Please enter at least one resume."); return; }

    document.getElementById("results").style.display = "none";
    document.getElementById("loading").style.display = "block";
    document.getElementById("analyzeBtn").disabled = true;

    try {
      const res = await fetch(`${BACKEND}/screen`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          job_description: jd,
          resumes: validResumes.map(r => ({
            name: r.name || "Unknown",
            text: r.text
          }))
        })
      });

      const data = await res.json();
      document.getElementById("loading").style.display = "none";
      renderResults(data);
    } catch (err) {
      document.getElementById("loading").style.display = "none";
      showError("⚠️ Could not connect to the backend. Make sure Flask is running on port 5001.\n\nRun: python app.py");
    }

    document.getElementById("analyzeBtn").disabled = false;
  }

  // ── RENDER RESULTS ──
  let lastResults = null;

  function renderResults(data) {
    lastResults = data;
    const { results, job_skills_required, total_candidates, timestamp } = data;

    document.getElementById("results").style.display = "block";
    document.getElementById("resultsMeta").textContent = `${timestamp} · ${total_candidates} candidate${total_candidates !== 1 ? 's' : ''}`;

    // Stats
    const topScore = results[0]?.final_score || 0;
    const avgScore = results.reduce((a, b) => a + b.final_score, 0) / results.length;
    document.getElementById("statsRow").innerHTML = `
      <div class="stat-box"><div class="stat-num">${total_candidates}</div><div class="stat-lbl">Candidates Screened</div></div>
      <div class="stat-box"><div class="stat-num">${topScore}%</div><div class="stat-lbl">Top Score</div></div>
      <div class="stat-box"><div class="stat-num">${avgScore.toFixed(1)}%</div><div class="stat-lbl">Avg Score</div></div>
    `;

    // JD skills
    if (job_skills_required.length > 0) {
      document.getElementById("jdSkillsBox").innerHTML = `
        <div class="jd-skills-title">Skills detected in Job Description</div>
        <div class="skill-chips">
          ${job_skills_required.map(s => `<span class="chip neutral">${s}</span>`).join('')}
        </div>
      `;
    } else {
      document.getElementById("jdSkillsBox").style.display = 'none';
    }

    // Candidates
    const list = document.getElementById("candidateList");
    list.innerHTML = "";

    results.forEach((c, idx) => {
      const rankClass = c.rank <= 3 ? `rank-${c.rank}` : 'rank-other';
      const rankEmoji = c.rank === 1 ? '🥇' : c.rank === 2 ? '🥈' : c.rank === 3 ? '🥉' : `#${c.rank}`;

      const scoreClass = c.final_score >= 60 ? 'score-high' : c.final_score >= 35 ? 'score-mid' : 'score-low';

      const matchedHtml = c.matched_skills.length
        ? c.matched_skills.map(s => `<span class="chip match">✓ ${s}</span>`).join('')
        : '<span style="color:var(--muted);font-size:11px">None detected</span>';

      const missingHtml = c.missing_skills.length
        ? c.missing_skills.map(s => `<span class="chip miss">✗ ${s}</span>`).join('')
        : '<span style="color:var(--accent);font-size:11px">All matched!</span>';

      const sectionsHtml = c.sections_found.length
        ? c.sections_found.map(s => `<span class="section-tag">${s}</span>`).join('')
        : '';

      const card = document.createElement("div");
      card.className = `candidate-card ${rankClass}`;
      card.style.animationDelay = `${idx * 0.08}s`;
      card.innerHTML = `
        <div class="cand-top">
          <div class="cand-left">
            <div class="rank-badge">${rankEmoji}</div>
            <div>
              <div class="cand-name">${c.name}</div>
              <div class="cand-email">${c.email}</div>
              ${sectionsHtml ? `<div class="sections-row">${sectionsHtml}</div>` : ''}
            </div>
          </div>
          <div class="score-circle">
            <div class="score-num ${scoreClass}">${c.final_score}%</div>
            <div class="score-label">Match Score</div>
          </div>
        </div>

        <div class="score-bars">
          <div class="bar-item">
            <div class="bar-label">TF-IDF Similarity <span>${c.similarity_score}%</span></div>
            <div class="bar-track"><div class="bar-fill tfidf" style="width:${c.similarity_score}%"></div></div>
          </div>
          <div class="bar-item">
            <div class="bar-label">Skill Match <span>${c.skill_match_score}%</span></div>
            <div class="bar-track"><div class="bar-fill skill" style="width:${c.skill_match_score}%"></div></div>
          </div>
        </div>

        <div class="skill-section">
          <div class="skill-row">
            <div class="skill-row-label">Matched</div>
            <div class="skill-chips">${matchedHtml}</div>
          </div>
          <div class="skill-row">
            <div class="skill-row-label">Missing</div>
            <div class="skill-chips">${missingHtml}</div>
          </div>
        </div>

        ${c.experience_years > 0 ? `<div class="exp-badge">🗂 ${c.experience_years}+ years experience detected</div>` : ''}
      `;
      list.appendChild(card);
    });

    document.getElementById("results").scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── EXPORT CSV ──
  function exportCSV() {
    if (!lastResults) return;
    const rows = [["Rank","Name","Email","Final Score","TF-IDF Score","Skill Match","Experience Years","Matched Skills","Missing Skills"]];
    lastResults.results.forEach(c => {
      rows.push([
        c.rank, c.name, c.email,
        c.final_score + "%", c.similarity_score + "%", c.skill_match_score + "%",
        c.experience_years,
        c.matched_skills.join("; "),
        c.missing_skills.join("; ")
      ]);
    });
    const csv = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "recruit_ai_results.csv";
    a.click();
  }

  function showError(msg) {
    const box = document.getElementById("errorBox");
    box.textContent = msg;
    box.style.display = "block";
  }

  function hideError() {
    document.getElementById("errorBox").style.display = "none";
  }
</script>
</body>
</html>
